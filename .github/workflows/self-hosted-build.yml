name: Self-hosted Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Self-hosted platform to run. Linux self-hosted is disabled; all runs macOS and Windows.
        required: true
        type: choice
        options: [macos, windows, all]
        default: macos
      mode:
        description: Run validate only or a full build
        required: true
        type: choice
        options: [validate, build]
        default: validate
      pristine:
        description: Use --pristine for full builds
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  macos:
    name: macOS self-hosted ${{ inputs.mode }}
    if: ${{ inputs.platform == 'all' || inputs.platform == 'macos' }}
    runs-on: [self-hosted, macOS, zmk-docker]
    timeout-minutes: 180
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Force LF checkout
        run: bash .github/scripts/force-lf-checkout.sh
      - name: Check runner tools
        run: bash .github/scripts/check-runner-tools.sh
      - name: Check Bash syntax
        run: |
          bash -n ./build.sh
          for script in .github/scripts/*.sh; do
            bash -n "${script}"
          done
      - name: Check LF line endings
        run: bash .github/scripts/check-lf.sh
      - name: Check LF helper behavior
        run: bash .github/scripts/test-check-lf.sh
      - name: Check output helper behavior
        run: bash .github/scripts/test-check-build-output.sh
      - name: Test copy excludes
        run: bash .github/scripts/test-copy-excludes.sh
      - name: Run build script
        run: |
          if [ "${{ inputs.mode }}" = "validate" ]; then
            ./build.sh validate .github/fixtures/ci-zmk-config
          elif [ "${{ inputs.pristine }}" = "true" ]; then
            ./build.sh .github/fixtures/ci-zmk-config --pristine
          else
            ./build.sh .github/fixtures/ci-zmk-config
          fi
      - name: Check build output
        run: bash .github/scripts/check-build-output.sh "${{ inputs.mode }}"
      - name: Upload build output
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: zmk-self-hosted-macos-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .build/**/build.log
            .build/**/build-summary.txt
            .build/**/*.uf2
            .build/**/*.hex
            .build/**/*.bin
          if-no-files-found: error
          retention-days: 14
          include-hidden-files: true

  windows:
    name: Windows self-hosted ${{ inputs.mode }}
    if: ${{ inputs.platform == 'all' || inputs.platform == 'windows' }}
    runs-on: [self-hosted, Windows, zmk-docker]
    timeout-minutes: 180
    defaults:
      run:
        shell: C:\Progra~1\Git\bin\bash.exe --noprofile --norc -e -o pipefail {0}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Force LF checkout
        run: bash .github/scripts/force-lf-checkout.sh
      - name: Check runner tools
        run: bash .github/scripts/check-runner-tools.sh
      - name: Check Bash syntax
        run: |
          bash -n ./build.sh
          for script in .github/scripts/*.sh; do
            bash -n "${script}"
          done
      - name: Check LF line endings
        run: bash .github/scripts/check-lf.sh
      - name: Check LF helper behavior
        run: bash .github/scripts/test-check-lf.sh
      - name: Check output helper behavior
        run: bash .github/scripts/test-check-build-output.sh
      - name: Test copy excludes
        run: bash .github/scripts/test-copy-excludes.sh
      - name: Run build script
        run: |
          if [ "${{ inputs.mode }}" = "validate" ]; then
            ./build.sh validate .github/fixtures/ci-zmk-config
          elif [ "${{ inputs.pristine }}" = "true" ]; then
            ./build.sh .github/fixtures/ci-zmk-config --pristine
          else
            ./build.sh .github/fixtures/ci-zmk-config
          fi
      - name: Check build output
        run: bash .github/scripts/check-build-output.sh "${{ inputs.mode }}"
      - name: Upload build output
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: zmk-self-hosted-windows-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .build/**/build.log
            .build/**/build-summary.txt
            .build/**/*.uf2
            .build/**/*.hex
            .build/**/*.bin
          if-no-files-found: error
          retention-days: 14
          include-hidden-files: true
