          elif [ "${{ inputs.pristine }}" = "true" ]; then
            ./build.sh .github/fixtures/ci-zmk-config --pristine
          else
            ./build.sh .github/fixtures/ci-zmk-config
          fi
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: zmk-self-hosted-macos-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .build/**/build.log
