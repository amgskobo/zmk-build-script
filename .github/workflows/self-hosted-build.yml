            .build/**/*.bin
          if-no-files-found: warn
          retention-days: 14
          include-hidden-files: true

  windows:
    name: Windows self-hosted ${{ inputs.mode }}
    if: ${{ inputs.platform == 'all' || inputs.platform == 'windows' }}
    runs-on: [self-hosted, windows, zmk-docker]
    timeout-minutes: 180
    defaults:
      run:
        shell: bash
