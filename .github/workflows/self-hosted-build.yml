name: Self-hosted Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Self-hosted platform to run
        required: true
        type: choice
        options: [all, linux, macos, windows]
        default: all
      mode:
        description: Run validate only or a full build
        required: true
        type: choice
        options: [build, validate]
        default: validate
      pristine:
        description: Use --pristine for full builds
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  linux:
    name: Linux self-hosted ${{ inputs.mode }}
    if: ${{ inputs.platform == 'all' || inputs.platform == 'linux' }}
    runs-on: [self-hosted, linux, zmk-docker]
    timeout-minutes: 180
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - run: bash .github/scripts/check-runner-tools.sh
      - run: bash -n ./build.sh
      - run: |
          if git grep -I -n $'\r' -- .; then
            echo "CRLF line endings found." >&2
            exit 1
          fi
      - run: |
          if [ "${{ inputs.mode }}" = "validate" ]; then
            ./build.sh validate .github/fixtures/ci-zmk-config
          elif [ "${{ inputs.pristine }}" = "true" ]; then
            ./build.sh .github/fixtures/ci-zmk-config --pristine
          else
            ./build.sh .github/fixtures/ci-zmk-config
          fi
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: zmk-self-hosted-linux-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .build/**/build.log
            .build/**/build-summary.txt
            .build/**/*.uf2
            .build/**/*.hex
            .build/**/*.bin
          if-no-files-found: warn
          retention-days: 14
          include-hidden-files: true

  macos:
    name: macOS self-hosted ${{ inputs.mode }}
    if: ${{ inputs.platform == 'all' || inputs.platform == 'macos' }}
    runs-on: [self-hosted, macOS, zmk-docker]
    timeout-minutes: 180
    defaults:
      run:
        shell: bash
